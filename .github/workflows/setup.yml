name: 🔧 One-time Setup (Supabase + Vercel)

# Run this workflow ONCE after setting the required GitHub secrets:
#   VERCEL_TOKEN          – Vercel access token (vercel.com/account/tokens)
#   SUPABASE_ACCESS_TOKEN – Supabase Management API key (sb_publishable_…)
#   VITE_SUPABASE_ANON_KEY – Supabase anon/public JWT key
#
# VITE_SUPABASE_URL is already hardcoded below (not a secret — it's public).

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  SUPABASE_PROJECT_REF: yjzsvyksjjrkupgxueua
  VERCEL_PROJECT_ID: prj_L3L3snANzop6ea36cGlhq0ZcF0MP
  VITE_SUPABASE_URL: https://yjzsvyksjjrkupgxueua.supabase.co

jobs:
  # ─── 1. Supabase database migration ───────────────────────────
  setup-supabase:
    name: Supabase – Migration & Storage bucket
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run database migration
        run: |
          PAYLOAD=$(jq -Rs '{"query": .}' supabase/migrations/001_initial_schema.sql)
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -d "$PAYLOAD")
          HTTP=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP: $HTTP"
          echo "Response: $BODY" | head -c 2000
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
            echo "::error::Migration failed (HTTP $HTTP)"
            exit 1
          fi
          echo "✅ Migration applied successfully"

      - name: Create coin-images storage bucket
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/storage/buckets" \
            -d '{"id":"coin-images","name":"coin-images","public":true}')
          HTTP=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP: $HTTP"
          echo "Response: $BODY"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "✅ Bucket 'coin-images' created"
          elif echo "$BODY" | grep -qi "already exist\|Duplicate\|already"; then
            echo "ℹ️  Bucket 'coin-images' already exists – skipping"
          else
            echo "::error::Failed to create bucket (HTTP $HTTP)"
            exit 1
          fi

  # ─── 2. Vercel environment variables + redeploy ───────────────
  setup-vercel:
    name: Vercel – Set env vars & redeploy
    runs-on: ubuntu-latest

    steps:
      - name: Get Vercel project team ID
        id: info
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PROJECT=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}")
          echo "$PROJECT" | jq '{name,accountId,framework}' 2>/dev/null || echo "$PROJECT" | head -c 500
          TEAM_ID=$(echo "$PROJECT" | jq -r '.accountId // empty')
          echo "team_id=$TEAM_ID" >> "$GITHUB_OUTPUT"
          echo "Team ID: $TEAM_ID"

      - name: Upsert VITE_SUPABASE_URL
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          TEAM_ID: ${{ steps.info.outputs.team_id }}
        run: |
          TQ="${TEAM_ID:+?teamId=$TEAM_ID}"
          BASE="https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}"

          # Check if it already exists
          EXISTING_ID=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "${BASE}/env${TQ}" \
            | jq -r '.envs[]? | select(.key == "VITE_SUPABASE_URL") | .id' | head -1)

          if [ -n "$EXISTING_ID" ]; then
            echo "Updating existing var (id=$EXISTING_ID)..."
            curl -s -X PATCH \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              "${BASE}/env/${EXISTING_ID}${TQ}" \
              -d "{\"value\":\"${VITE_SUPABASE_URL}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}" \
              | jq '{key,value,type}' 2>/dev/null
          else
            echo "Creating new var..."
            curl -s -X POST \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              "${BASE}/env${TQ}" \
              -d "{\"key\":\"VITE_SUPABASE_URL\",\"value\":\"${VITE_SUPABASE_URL}\",\"type\":\"plain\",\"target\":[\"production\",\"preview\",\"development\"]}" \
              | jq '{key,type}' 2>/dev/null
          fi
          echo "✅ VITE_SUPABASE_URL set"

      - name: Upsert VITE_SUPABASE_ANON_KEY
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          TEAM_ID: ${{ steps.info.outputs.team_id }}
          ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          TQ="${TEAM_ID:+?teamId=$TEAM_ID}"
          BASE="https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}"

          EXISTING_ID=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "${BASE}/env${TQ}" \
            | jq -r '.envs[]? | select(.key == "VITE_SUPABASE_ANON_KEY") | .id' | head -1)

          PAYLOAD=$(jq -n \
            --arg v "$ANON_KEY" \
            '{key:"VITE_SUPABASE_ANON_KEY",value:$v,type:"encrypted",target:["production","preview","development"]}')

          if [ -n "$EXISTING_ID" ]; then
            echo "Updating existing var (id=$EXISTING_ID)..."
            UPDATE_PAYLOAD=$(jq -n \
              --arg v "$ANON_KEY" \
              '{value:$v,type:"encrypted",target:["production","preview","development"]}')
            curl -s -X PATCH \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              "${BASE}/env/${EXISTING_ID}${TQ}" \
              -d "$UPDATE_PAYLOAD" \
              | jq '{key,type}' 2>/dev/null
          else
            echo "Creating new var..."
            curl -s -X POST \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              "${BASE}/env${TQ}" \
              -d "$PAYLOAD" \
              | jq '{key,type}' 2>/dev/null
          fi
          echo "✅ VITE_SUPABASE_ANON_KEY set"

      - name: Trigger Vercel production redeploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          TEAM_ID: ${{ steps.info.outputs.team_id }}
        run: |
          TQ="${TEAM_ID:+?teamId=$TEAM_ID}"
          TAQ="${TEAM_ID:+&teamId=$TEAM_ID}"

          # Find the latest production deployment to redeploy
          LATEST_UID=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&target=production&limit=1${TAQ}" \
            | jq -r '.deployments[0].uid // empty')

          echo "Latest deployment UID: $LATEST_UID"

          if [ -n "$LATEST_UID" ]; then
            RESP=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.vercel.com/v13/deployments${TQ}" \
              -d "{\"deploymentId\":\"${LATEST_UID}\",\"name\":\"mince\",\"target\":\"production\"}")
            HTTP=$(echo "$RESP" | tail -1)
            BODY=$(echo "$RESP" | head -n -1)
            echo "HTTP: $HTTP"
            echo "$BODY" | jq '{id,url,readyState}' 2>/dev/null || echo "$BODY" | head -c 500
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
              echo "✅ Vercel redeploy triggered"
            else
              echo "::warning::Redeploy returned HTTP $HTTP — check Vercel dashboard to trigger manually"
            fi
          else
            echo "::warning::No existing deployment found — push to main to trigger first deploy"
          fi
