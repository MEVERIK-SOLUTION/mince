name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  VERCEL_PROJECT_ID: prj_L3L3snANzop6ea36cGlhq0ZcF0MP
  VITE_SUPABASE_URL: https://yjzsvyksjjrkupgxueua.supabase.co

jobs:
  # ─── Build & Lint ─────────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # Vite automatically reads frontend/.env.production for VITE_* vars.
        # VITE_SUPABASE_ANON_KEY is in .env.production (public anon key).
        run: npm run build

  # ─── Deploy to Vercel (main branch or manual trigger) ─────────
  # Required GitHub repository secrets:
  #   VERCEL_TOKEN    – Vercel access token (vercel.com/account/tokens)
  #   VERCEL_ORG_ID   – Vercel team/user ID (optional: resolved automatically
  #                     from the API if not set, but setting it directly is faster)
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: prj_L3L3snANzop6ea36cGlhq0ZcF0MP

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve Vercel org ID
        id: vercel-org
        env:
          VERCEL_ORG_ID_SECRET: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          if [ -n "$VERCEL_ORG_ID_SECRET" ]; then
            echo "org_id=$VERCEL_ORG_ID_SECRET" >> "$GITHUB_OUTPUT"
            echo "Using VERCEL_ORG_ID from secret"
          else
            ORG_ID=$(curl -s \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}" \
              | jq -r '.accountId // empty')
            echo "org_id=$ORG_ID" >> "$GITHUB_OUTPUT"
            echo "Resolved Vercel org ID: $ORG_ID"
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        env:
          VERCEL_ORG_ID: ${{ steps.vercel-org.outputs.org_id }}
        working-directory: frontend
        run: vercel pull --yes --environment=production

      - name: Build for Vercel
        env:
          VERCEL_ORG_ID: ${{ steps.vercel-org.outputs.org_id }}
        working-directory: frontend
        run: vercel build --prod

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ steps.vercel-org.outputs.org_id }}
        working-directory: frontend
        run: vercel deploy --prebuilt --prod
