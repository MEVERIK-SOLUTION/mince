version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: coin_postgres
    environment:
      POSTGRES_DB: coin_collection
      POSTGRES_USER: coin_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coin_user -d coin_collection"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coin_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: coin_backend
    environment:
      - DATABASE_URL=postgresql://coin_user:secure_password@postgres:5432/coin_collection
      - REDIS_URL=redis://redis:6379
      - UPLOAD_DIR=/app/uploads
      - ENVIRONMENT=development
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coin_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_UPLOAD_URL=http://localhost:8000/uploads
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: coin_network